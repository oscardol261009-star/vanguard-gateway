<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1912">
<title>🌱 Plant Doctor</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0d1912;
    --card: #142219;
    --line: #23372a;
    --txt: #e6f2e9;
    --dim: #8fae9c;
    --green: #4ade80;
    --amber: #fbbf24;
    --red: #f87171;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(120% 80% at 50% 0%, #16301f 0%, var(--bg) 60%);
    color: var(--txt);
    min-height: 100vh;
    padding: 18px 16px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap { max-width: 620px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 18px; }
  h1 { font-size: 24px; margin: 0 0 4px; letter-spacing: -0.5px; }
  header p { margin: 0; color: var(--dim); font-size: 13px; }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .card.flush { padding: 0; overflow: hidden; }

  /* ---------- vue caméra live ---------- */
  .stage { position: relative; background: #000; aspect-ratio: 3 / 4; }
  .stage video, .stage img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .reticle {
    position: absolute; inset: 12% 10%; border: 2px solid rgba(255,255,255,.35);
    border-radius: 18px; pointer-events: none;
    box-shadow: 0 0 0 2000px rgba(0,0,0,.18);
  }
  .hint {
    position: absolute; top: 12px; left: 0; right: 0; text-align: center;
    font-size: 12px; color: #fff; text-shadow: 0 1px 4px #000; pointer-events: none;
  }

  .controls {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px calc(14px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
  }
  .shutter {
    width: 68px; height: 68px; border-radius: 50%; border: 4px solid rgba(255,255,255,.9);
    background: var(--green); padding: 0; flex: 0 0 auto; cursor: pointer;
    box-shadow: 0 4px 18px rgba(0,0,0,.5);
  }
  .shutter:active { transform: scale(.93); }
  .icon-btn {
    width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25);
    background: rgba(0,0,0,.45); color: #fff; font-size: 19px; padding: 0;
    flex: 0 0 auto; cursor: pointer;
  }

  .flash {
    position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none;
  }
  .flash.on { animation: pop .35s ease-out; }
  @keyframes pop { from { opacity: .85; } to { opacity: 0; } }

  .scanline {
    position: absolute; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    box-shadow: 0 0 14px var(--green); animation: scan 1.7s ease-in-out infinite;
  }
  @keyframes scan { 0%,100% { top: 6%; } 50% { top: 92%; } }

  .veil {
    position: absolute; inset: 0; background: rgba(5,15,9,.55);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; font-size: 14px; color: #fff; text-shadow: 0 1px 4px #000;
  }

  input[type=text] {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--line); background: #0f1c14; color: var(--txt);
    font-size: 15px;
  }
  input[type=text]::placeholder { color: #5d7a68; }
  input[type=text]:focus { outline: none; border-color: var(--green); }

  button.wide {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--green); color: #05210f; font-size: 16px; font-weight: 700;
    cursor: pointer;
  }
  button.ghost {
    width: 100%; background: transparent; border: 1px solid var(--line); color: var(--dim);
    font-weight: 500; font-size: 14px; padding: 11px; border-radius: 12px;
    margin-top: 8px; cursor: pointer;
  }

  .hidden { display: none !important; }

  .spinner {
    width: 26px; height: 26px; border: 3px solid rgba(255,255,255,.25);
    border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .species { font-size: 22px; font-weight: 700; margin: 0 0 2px; }
  .latin { font-style: italic; color: var(--dim); font-size: 14px; margin: 0 0 12px; }

  .badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 999px;
    background: rgba(255,255,255,.06); border: 1px solid var(--line);
  }
  .badge.bonne { color: var(--green); border-color: rgba(74,222,128,.4); }
  .badge.moyenne { color: var(--amber); border-color: rgba(251,191,36,.4); }
  .badge.mauvaise { color: var(--red); border-color: rgba(248,113,113,.4); }

  .resume { line-height: 1.55; font-size: 15px; margin: 0 0 4px; }

  h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .8px;
       color: var(--dim); margin: 18px 0 8px; }

  .pb { border-left: 3px solid var(--line); padding: 2px 0 2px 12px; margin-bottom: 12px; }
  .pb.faible { border-color: var(--green); }
  .pb.moyenne { border-color: var(--amber); }
  .pb.elevee { border-color: var(--red); }
  .pb .nom { font-weight: 700; margin-bottom: 3px; }
  .pb .txt { font-size: 14px; color: #c5d9cc; line-height: 1.5; margin-bottom: 3px; }
  .pb .txt span { color: var(--dim); }

  ul.todo { margin: 0; padding-left: 18px; line-height: 1.6; font-size: 15px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  td { padding: 8px 0; border-bottom: 1px solid var(--line); vertical-align: top; }
  td:first-child { color: var(--dim); width: 108px; }
  tr:last-child td { border-bottom: none; }

  .err { color: var(--red); font-size: 14px; line-height: 1.5; }
  .foot { text-align: center; color: #4f6a5a; font-size: 12px; margin-top: 22px; }

  .hist { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
  .hist img { width: 62px; height: 62px; border-radius: 10px; object-fit: cover;
              border: 1px solid var(--line); cursor: pointer; flex: 0 0 auto; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🌱 Plant Doctor</h1>
    <p>Vise une plante, appuie sur le bouton, tu as le diagnostic.</p>
  </header>

  <!-- Caméra live -->
  <div class="card flush" id="camCard">
    <div class="stage">
      <video id="video" playsinline autoplay muted></video>
      <img id="frozen" class="hidden" alt="Photo prise">
      <div class="reticle" id="reticle"></div>
      <div class="hint" id="hint">Cadre une feuille bien éclairée</div>
      <div class="scanline hidden" id="scanline"></div>
      <div class="veil hidden" id="veil">
        <div class="spinner"></div>
        <div id="veilTxt">Analyse en cours…</div>
      </div>
      <div class="flash" id="flash"></div>
      <div class="controls" id="controls">
        <button class="icon-btn" id="switchBtn" title="Changer de caméra">🔄</button>
        <button class="shutter" id="shutter" title="Prendre la photo"></button>
        <button class="icon-btn" id="galleryBtn" title="Choisir une image">🖼️</button>
      </div>
    </div>
  </div>

  <!-- Repli si la caméra est refusée / indisponible -->
  <div class="card hidden" id="fallbackCard">
    <div class="err" id="fallbackTxt" style="margin-bottom:12px"></div>
    <button class="wide" id="fallbackPick">Choisir une photo 🖼️</button>
  </div>

  <div class="card hidden" id="errCard"><div class="err" id="errTxt"></div></div>

  <div class="card hidden" id="resCard"></div>

  <div class="card hidden" id="againCard">
    <button class="wide" id="again">Nouvelle photo 📷</button>
  </div>

  <div class="card" id="noteCard">
    <input type="text" id="note" placeholder="Un détail à signaler ? (facultatif)" maxlength="200">
  </div>

  <div class="card hidden" id="histCard">
    <h3 style="margin-top:0">Historique</h3>
    <div class="hist" id="hist"></div>
  </div>

  <input type="file" id="file" accept="image/*" class="hidden">

  <div class="foot">Analyse par IA — à confirmer pour toute plante consommée ou médicinale.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const MAX_SIDE = 1400;

let stream = null;
let facing = 'environment';
let currentImage = null;
let busy = false;

/* ---------- caméra live ---------- */

async function startCamera() {
  stopCamera();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facing }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false,
    });
    $('video').srcObject = stream;
    await $('video').play();
    show('camCard');
    hide('fallbackCard');
  } catch (e) {
    handleCameraError(e);
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach((t) => t.stop());
    stream = null;
  }
}

function handleCameraError(e) {
  const secure = window.isSecureContext;
  let msg;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    msg = "Ce navigateur ne donne pas accès à la caméra.";
  } else if (!secure) {
    msg = "La caméra ne marche qu'en HTTPS. Ouvre l'adresse en https:// (ou localhost).";
  } else if (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError')) {
    msg = "Accès caméra refusé. Autorise-le dans les réglages du site, puis recharge la page.";
  } else if (e && e.name === 'NotFoundError') {
    msg = "Aucune caméra détectée sur cet appareil.";
  } else {
    msg = 'Caméra indisponible' + (e && e.message ? ' : ' + e.message : '') + '.';
  }
  $('fallbackTxt').textContent = msg + " Tu peux quand même envoyer une photo depuis tes fichiers.";
  hide('camCard');
  show('fallbackCard');
}

$('switchBtn').onclick = () => {
  facing = facing === 'environment' ? 'user' : 'environment';
  startCamera();
};

/* ---------- capture ---------- */

$('shutter').onclick = () => {
  if (busy || !stream) return;
  const video = $('video');
  if (!video.videoWidth) return;

  $('flash').classList.remove('on');
  void $('flash').offsetWidth; // relance l'animation
  $('flash').classList.add('on');

  const scale = Math.min(1, MAX_SIDE / Math.max(video.videoWidth, video.videoHeight));
  const cv = document.createElement('canvas');
  cv.width = Math.round(video.videoWidth * scale);
  cv.height = Math.round(video.videoHeight * scale);
  cv.getContext('2d').drawImage(video, 0, 0, cv.width, cv.height);

  analyze(cv.toDataURL('image/jpeg', 0.85));
};

/* ---------- repli fichier ---------- */

$('galleryBtn').onclick = () => $('file').click();
$('fallbackPick').onclick = () => $('file').click();
$('file').onchange = (e) => { if (e.target.files[0]) loadFile(e.target.files[0]); };

function loadFile(file) {
  if (!file.type.startsWith('image/')) return showError("Ce fichier n'est pas une image.");
  const reader = new FileReader();
  reader.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, MAX_SIDE / Math.max(img.width, img.height));
      const cv = document.createElement('canvas');
      cv.width = Math.round(img.width * scale);
      cv.height = Math.round(img.height * scale);
      cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
      analyze(cv.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => showError('Impossible de lire cette image.');
    img.src = reader.result;
  };
  reader.readAsDataURL(file);
  $('file').value = '';
}

/* ---------- analyse ---------- */

async function analyze(dataUrl) {
  busy = true;
  currentImage = dataUrl;

  // On gèle l'image dans le cadre pendant l'analyse
  $('frozen').src = dataUrl;
  show('camCard');
  hide('fallbackCard');
  show('frozen', 'scanline', 'veil');
  hide('video', 'controls', 'reticle', 'hint', 'errCard', 'resCard', 'histCard', 'againCard', 'noteCard');
  stopCamera();

  const msgs = ['Analyse en cours…', "Identification de l'espèce…", 'Recherche de symptômes…', 'Rédaction des conseils…'];
  let i = 0;
  const tick = setInterval(() => { $('veilTxt').textContent = msgs[++i % msgs.length]; }, 3500);

  try {
    const r = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: dataUrl, note: $('note').value }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erreur inconnue.');
    render(data);
    saveHistory(dataUrl, data);
  } catch (e) {
    showError(e.message === 'Failed to fetch' ? 'Serveur injoignable. Vérifie ta connexion.' : e.message);
  } finally {
    clearInterval(tick);
    hide('scanline', 'veil');
    show('againCard');
    busy = false;
  }
}

$('again').onclick = () => {
  hide('againCard', 'resCard', 'errCard', 'frozen');
  show('video', 'controls', 'reticle', 'hint', 'noteCard');
  renderHistory();
  startCamera();
};

/* ---------- rendu ---------- */

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
}

function render(d) {
  if (d.est_une_plante === false) {
    $('resCard').innerHTML = '<p class="species">🤔 Pas de plante détectée</p>'
      + '<p class="resume">' + esc(d.resume) + '</p>';
    show('resCard');
    return;
  }

  const probs = d.problemes || [];
  let html = ''
    + '<p class="species">' + esc(d.espece) + '</p>'
    + '<p class="latin">' + esc(d.nom_latin) + '</p>'
    + '<div class="badges">'
    +   '<span class="badge ' + esc(d.etat_sante) + '">Santé : ' + esc(d.etat_sante) + '</span>'
    +   '<span class="badge">Confiance ' + esc(d.confiance) + '%</span>'
    +   (probs.length ? '<span class="badge">' + probs.length + ' problème' + (probs.length > 1 ? 's' : '') + '</span>'
                      : '<span class="badge bonne">Aucun problème</span>')
    + '</div>'
    + '<p class="resume">' + esc(d.resume) + '</p>';

  if (probs.length) {
    html += '<h3>Diagnostic</h3>';
    probs.forEach((p) => {
      html += '<div class="pb ' + esc(p.gravite) + '">'
        + '<div class="nom">' + esc(p.nom) + ' — gravité ' + esc(p.gravite) + '</div>'
        + '<div class="txt"><span>Symptômes :</span> ' + esc(p.symptomes) + '</div>'
        + '<div class="txt"><span>Traitement :</span> ' + esc(p.traitement) + '</div>'
        + '</div>';
    });
  }

  if ((d.actions_prioritaires || []).length) {
    html += '<h3>À faire maintenant</h3><ul class="todo">'
      + d.actions_prioritaires.map((a) => '<li>' + esc(a) + '</li>').join('')
      + '</ul>';
  }

  const e = d.entretien || {};
  html += '<h3>Entretien</h3><table>'
    + '<tr><td>☀️ Lumière</td><td>' + esc(e.lumiere) + '</td></tr>'
    + '<tr><td>💧 Arrosage</td><td>' + esc(e.arrosage) + '</td></tr>'
    + '<tr><td>🪴 Sol</td><td>' + esc(e.sol) + '</td></tr>'
    + '<tr><td>🌡️ Température</td><td>' + esc(e.temperature) + '</td></tr>'
    + '<tr><td>🧪 Engrais</td><td>' + esc(e.engrais) + '</td></tr>'
    + '<tr><td>🐾 Animaux</td><td>' + esc(d.toxique_animaux) + '</td></tr>'
    + '</table>';

  $('resCard').innerHTML = html;
  show('resCard');
  $('resCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  $('errTxt').textContent = msg;
  show('errCard');
}

function show() { [...arguments].forEach((id) => $(id).classList.remove('hidden')); }
function hide() { [...arguments].forEach((id) => $(id).classList.add('hidden')); }

/* ---------- historique local ---------- */

const KEY = 'plant-doctor-history';

function saveHistory(src, data) {
  try {
    const cv = document.createElement('canvas');
    cv.width = cv.height = 140;
    const img = new Image();
    img.onload = () => {
      const s = Math.min(img.width, img.height);
      cv.getContext('2d').drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, 140, 140);
      const list = readHistory();
      list.unshift({ thumb: cv.toDataURL('image/jpeg', 0.6), data, at: Date.now() });
      localStorage.setItem(KEY, JSON.stringify(list.slice(0, 12)));
    };
    img.src = src;
  } catch (e) { /* quota plein : pas grave */ }
}

function readHistory() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) { return []; }
}

function renderHistory() {
  const list = readHistory();
  if (!list.length) return hide('histCard');
  $('hist').innerHTML = '';
  list.forEach((it) => {
    const im = new Image();
    im.src = it.thumb;
    im.title = (it.data && it.data.espece) || '';
    im.onclick = () => {
      $('frozen').src = it.thumb;
      show('frozen', 'againCard');
      hide('video', 'controls', 'reticle', 'hint');
      stopCamera();
      render(it.data);
    };
    $('hist').appendChild(im);
  });
  show('histCard');
}

/* ---------- démarrage ---------- */

renderHistory();
startCamera();

// On coupe la caméra quand l'onglet passe en arrière-plan, on la relance au retour
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    stopCamera();
  } else if (!busy && !$('video').classList.contains('hidden')) {
    startCamera();
  }
});
</script>
</body>
</html>
